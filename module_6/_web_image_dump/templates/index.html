<!-- module_6/src/web/templates/index.html -->
<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>{{ title or "Module 6" }}</title>
    <style>
      body { font-family: Arial, Helvetica, sans-serif; margin: 24px; }
      .btn { display:inline-block; padding: 10px 14px; border: 1px solid #111; border-radius: 6px; text-decoration:none; color:#fff; background:#111; }
      .card { border: 1px solid #ddd; border-radius: 8px; padding: 14px; margin-top: 12px; }
      .muted { color:#666; }
    </style>
  </head>
  <body>
    <h1>Module 6</h1>

    <a class="btn" href="{{ url_for('analysis') }}">Go to Analysis</a>

    <div class="card">
      <div><strong>Applicant count (q1):</strong> <span class="muted">{{ results.q1 }}</span></div>
      <div><strong>Row count:</strong> <span class="muted">{{ results.row_count }}</span></div>
      <div class="muted" style="margin-top:10px;">{{ results.notes }}</div>
    </div>
  </body>
</html>
